spring.devtools.restart.enabled=true

# spring.datasource.url=jdbc:mysql://localhost:3306/soccerdb?useSSL=false&serverTimezone=UTC
# spring.datasource.username=soccerdb
# spring.datasource.password=admin_PW

spring.datasource.url=${AWS_RDS_URL}
spring.datasource.username=${AWS_RDS_USERNAME}
spring.datasource.password=${AWS_RDS_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect